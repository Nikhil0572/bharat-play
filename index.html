
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bharat Play</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07070a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bharat Play">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #07070a;
    --saffron: #FF9933;
    --white: #FFFFFF;
    --green: #128807;
    --chakra: #0B1F6B;
    --heart: #FF3B5C;
    --text-dim: rgba(255,255,255,0.72);
    --text-faint: rgba(255,255,255,0.45);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #app{
    position:relative;
    width:100%;
    height:100vh;
    max-width:480px;
    margin:0 auto;
    background:#000;
    overflow:hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }

  /* Top bar */
  .topbar{
    position:absolute; top:0; left:0; right:0;
    z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 16px 10px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0));
    pointer-events:none;
  }
  .logo{
    display:flex; align-items:center; gap:8px;
    pointer-events:auto;
  }
  .logo-mark{
    width:26px; height:26px;
    border-radius:50%;
    background: conic-gradient(var(--saffron) 0deg 120deg, var(--white) 120deg 240deg, var(--green) 240deg 360deg);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
  }
  .logo-mark::after{
    content:"";
    width:9px; height:9px;
    background:var(--bg);
    border-radius:50%;
  }
  .logo-text{
    font-family:'Poppins',sans-serif;
    font-weight:800;
    font-size:18px;
    letter-spacing:0.2px;
    color:var(--white);
  }
  .logo-text span{
    background: linear-gradient(90deg, var(--saffron), var(--white) 50%, var(--green));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .tab-row{
    display:flex; gap:18px;
    pointer-events:auto;
  }
  .tab{
    font-size:15px; font-weight:600;
    color:var(--text-faint);
    position:relative; padding-bottom:4px;
  }
  .tab.active{ color:var(--white); }
  .tab.active::after{
    content:"";
    position:absolute; bottom:0; left:0; right:0;
    height:2px; border-radius:2px;
    background: linear-gradient(90deg, var(--saffron), var(--white), var(--green));
  }

  /* Reels feed */
  .feed{
    height:100%; width:100%;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scrollbar-width:none;
  }
  .feed::-webkit-scrollbar{display:none;}

  .reel{
    position:relative;
    height:100vh; width:100%;
    scroll-snap-align:start;
    display:flex; align-items:center; justify-content:center;
    background:#000;
    overflow:hidden;
  }
  .reel video{
    width:100%; height:100%;
    object-fit:cover;
    background:#000;
  }
  .reel-shade{
    position:absolute; left:0; right:0; bottom:0;
    height:45%;
    background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0));
    pointer-events:none;
  }

  /* Right action rail */
  .rail{
    position:absolute; right:10px; bottom:110px;
    z-index:15;
    display:flex; flex-direction:column; align-items:center; gap:22px;
  }
  .rail-item{ display:flex; flex-direction:column; align-items:center; gap:4px; }
  .rail-btn{
    width:46px; height:46px;
    border-radius:50%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,0.12);
    transition: transform 0.15s ease;
  }
  .rail-btn:active{ transform: scale(0.88); }
  .rail-btn svg{ width:23px; height:23px; }
  .rail-count{
    font-size:12px; font-weight:600; color:var(--white);
    text-shadow:0 1px 3px rgba(0,0,0,0.6);
  }
  .rail-avatar{
    width:42px; height:42px; border-radius:50%;
    padding:2px;
    background: conic-gradient(var(--saffron), var(--white), var(--green), var(--saffron));
    margin-bottom:4px;
  }
  .rail-avatar img{
    width:100%; height:100%; border-radius:50%;
    object-fit:cover;
    border:2px solid #000;
  }
  .liked svg path{ fill:var(--heart); stroke:var(--heart); }
  .liked .rail-btn{ animation: pop 0.35s ease; }
  @keyframes pop{ 0%{transform:scale(1);} 40%{transform:scale(1.25);} 100%{transform:scale(1);} }

  /* Bottom info */
  .info{
    position:absolute; left:14px; right:80px; bottom:24px;
    z-index:15;
    color:var(--white);
  }
  .username{
    display:flex; align-items:center; gap:8px;
    font-weight:700; font-size:15px;
    margin-bottom:6px;
  }
  .username .tag{
    font-size:11px; font-weight:600;
    padding:2px 8px; border-radius:20px;
    background: linear-gradient(90deg, rgba(255,153,51,0.25), rgba(19,136,8,0.25));
    border:1px solid rgba(255,255,255,0.2);
    color:var(--white);
  }
  .follow-btn{
    font-size:12px; font-weight:700;
    border:1px solid var(--white);
    border-radius:6px;
    padding:3px 10px;
    background:transparent; color:var(--white);
  }
  .caption{
    font-size:13.5px; line-height:1.4;
    color:var(--text-dim);
    margin-bottom:8px;
  }
  .sound{
    display:flex; align-items:center; gap:6px;
    font-size:12px; color:var(--text-dim);
  }
  .sound-icon{
    width:14px; height:14px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .marquee-wrap{ overflow:hidden; max-width:200px; }
  .marquee{
    white-space:nowrap;
    display:inline-block;
    animation: scrollText 8s linear infinite;
  }
  @keyframes scrollText{
    0%{ transform:translateX(0%); }
    100%{ transform:translateX(-50%); }
  }

  /* mute toggle */
  .mute-btn{
    position:absolute; top:70px; right:12px; z-index:20;
    width:34px; height:34px; border-radius:50%;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.2);
    display:flex; align-items:center; justify-content:center;
  }
  .mute-btn svg{ width:16px; height:16px; }

  /* progress dots at very top (chakra spin) */
  .loading-hint{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:var(--text-faint); font-size:12px;
    pointer-events:none;
  }

  /* Bottom nav */
  .bottomnav{
    position:absolute; left:0; right:0; bottom:0;
    z-index:20;
    display:flex; justify-content:space-around; align-items:center;
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
  }
  .nav-item{ display:flex; flex-direction:column; align-items:center; gap:3px; opacity:0.55; }
  .nav-item.active{ opacity:1; }
  .nav-item svg{ width:22px; height:22px; }
  .nav-item span{ font-size:9.5px; color:var(--white); font-weight:600; }
  .nav-create{
    width:34px; height:26px;
    border-radius:8px;
    background: linear-gradient(90deg, var(--saffron), var(--white), var(--green));
    display:flex; align-items:center; justify-content:center;
  }
  .nav-create svg{ width:16px; height:16px; }

  @media (min-width:481px){
    body{ display:flex; align-items:center; justify-content:center; background:#111; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="logo">
      <div class="logo-mark"></div>
      <div class="logo-text">Bharat<span>Play</span></div>
    </div>
    <div class="tab-row">
      <div class="tab">Following</div>
      <div class="tab active">Reels</div>
    </div>
  </div>

  <button class="mute-btn" id="muteBtn" aria-label="Mute toggle">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
  </button>

  <div class="feed" id="feed"></div>

  <div class="bottomnav">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="white"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      <span>Home</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </div>
    <div class="nav-item">
      <div class="nav-create">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <span>Banao</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      <span>Pasand</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      <span>Profile</span>
    </div>
  </div>
</div>

<script>
const REELS = [
  {
    src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",
    user: "riya.dance", tag: "Trending",
    caption: "Sunday morning vibes 🌻 nayi choreography try ki maine, kaisi lagi batao! #dance #bharatplay",
    sound: "Riya ki Original Awaaz",
    avatar: "https://i.pravatar.cc/100?img=47",
    likes: "128K", comments: "842", shares: "310"
  },
  {
    src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4",
    user: "foodie_raj", tag: "Foodie",
    caption: "Ghar ka banaya street style pani puri 😋 recipe comment me maango! #khana #streetfood",
    sound: "Original audio - foodie_raj",
    avatar: "https://i.pravatar.cc/100?img=12",
    likes: "64.2K", comments: "1.2K", shares: "980"
  },
  {
    src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
    user: "traveltak.india", tag: "Travel",
    caption: "Ladakh ki subah ❄️ ye view kabhi purana nahi hota. Kahan ghumne jaana hai next? #india #travel",
    sound: "Pahadi beats - remix",
    avatar: "https://i.pravatar.cc/100?img=33",
    likes: "302K", comments: "5.4K", shares: "2.1K"
  },
  {
    src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4",
    user: "comedy.wala.arjun", tag: "Comedy",
    caption: "Jab ghar walo ko pata chale ki result aa gaya 😂😂 tag karo apne dost ko!",
    sound: "Funny trending sound",
    avatar: "https://i.pravatar.cc/100?img=15",
    likes: "89.7K", comments: "3.3K", shares: "1.5K"
  },
  {
    src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4",
    user: "studio.beats.official", tag: "Music",
    caption: "Naye album ka pehla jhalak 🎶 full song link bio me. #newmusic #bharatplay",
    sound: "Studio Beats - Teaser",
    avatar: "https://i.pravatar.cc/100?img=60",
    likes: "210K", comments: "7.8K", shares: "4.4K"
  }
];

const feed = document.getElementById('feed');
let muted = true;

function heartIcon(filled){
  return `<svg viewBox="0 0 24 24" ${filled? 'fill="var(--heart)" stroke="var(--heart)"':'fill="none" stroke="white"'} stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>`;
}
const commentIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>`;
const shareIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
const moreIcon = `<svg viewBox="0 0 24 24" fill="white"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>`;
const noteIcon = `<svg viewBox="0 0 24 24" fill="white"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3" fill="none" stroke="white" stroke-width="2"/><circle cx="18" cy="16" r="3" fill="none" stroke="white" stroke-width="2"/></svg>`;

REELS.forEach((r, i) => {
  const el = document.createElement('div');
  el.className = 'reel';
  el.innerHTML = `
    <video src="${r.src}" loop playsinline muted preload="metadata"></video>
    <div class="reel-shade"></div>
    <div class="rail">
      <div class="rail-item">
        <div class="rail-avatar"><img src="${r.avatar}" alt=""></div>
      </div>
      <div class="rail-item like-item">
        <div class="rail-btn">${heartIcon(false)}</div>
        <div class="rail-count">${r.likes}</div>
      </div>
      <div class="rail-item">
        <div class="rail-btn">${commentIcon}</div>
        <div class="rail-count">${r.comments}</div>
      </div>
      <div class="rail-item">
        <div class="rail-btn">${shareIcon}</div>
        <div class="rail-count">${r.shares}</div>
      </div>
      <div class="rail-item">
        <div class="rail-btn">${moreIcon}</div>
      </div>
    </div>
    <div class="info">
      <div class="username">
        <span>@${r.user}</span>
        <span class="tag">${r.tag}</span>
        <span class="follow-btn">Follow</span>
      </div>
      <div class="caption">${r.caption}</div>
      <div class="sound">
        <div class="sound-icon">${noteIcon}</div>
        <div class="marquee-wrap"><div class="marquee">${r.sound} &nbsp;&nbsp;•&nbsp;&nbsp; ${r.sound} &nbsp;&nbsp;•&nbsp;&nbsp;</div></div>
      </div>
    </div>
  `;
  feed.appendChild(el);

  const video = el.querySelector('video');
  const likeItem = el.querySelector('.like-item');
  let liked = false;

  el.addEventListener('click', (e) => {
    if (e.target.closest('.rail-item') || e.target.closest('.info')) return;
    if (video.paused) video.play(); else video.pause();
  });

  likeItem.addEventListener('click', () => {
    liked = !liked;
    likeItem.classList.toggle('liked', liked);
    likeItem.querySelector('.rail-btn').innerHTML = heartIcon(liked);
  });

  el._video = video;
});

// Autoplay only the visible reel
const videos = [...document.querySelectorAll('.reel video')];
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const v = entry.target;
    if (entry.isIntersecting && entry.intersectionRatio > 0.6){
      v.muted = muted;
      v.play().catch(()=>{});
    } else {
      v.pause();
    }
  });
}, { threshold: [0.6] });
videos.forEach(v => observer.observe(v));

// start first video on load (needs a user gesture on some browsers, so also bind to first click)
window.addEventListener('load', () => {
  videos[0].muted = muted;
  videos[0].play().catch(()=>{});
});

const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', () => {
  muted = !muted;
  videos.forEach(v => v.muted = muted);
  muteBtn.innerHTML = muted
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a9 9 0 0 1 0 12"/></svg>`;
});

// Remove any previously installed service worker so old cached
// broken versions stop being served to returning visitors.
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then((regs) => {
    regs.forEach((reg) => reg.unregister());
  });
}
if (window.caches) {
  caches.keys().then((names) => names.forEach((n) => caches.delete(n)));
}
</script>
</body>
</html>
